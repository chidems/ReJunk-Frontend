<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Tracking — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="${session.user != null and #strings.toUpperCase(session.user.role).contains('ADMIN')} ? ~{fragments/navbar :: navbar-admin} : ~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <a th:href="@{/collections}" class="text-rj-green d-inline-block mb-3"><i class="bi bi-arrow-left me-1"></i> Back to Requests</a>
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="rj-card">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h2 class="rj-page-title mb-0" th:text="${collection.id} ?: 'CR-1042'">CR-1042</h2>
                            <div class="rj-page-subtitle">Submitted <span th:text="${collection.date} ?: 'Feb 8, 2026'">Feb 8, 2026</span></div>
                        </div>
                        <span class="rj-badge rj-badge-scheduled" th:text="${collection.status} ?: 'Scheduled'">Scheduled</span>
                    </div>
                    <div class="rj-card mt-3">
                        <h5 class="fw-bold mb-3">Status Timeline</h5>
                        <div th:each="step : ${timeline}" class="rj-timeline-item" th:classappend="${step.pending} ? 'pending'">
                            <div class="rj-timeline-dot"><i class="bi" th:classappend="${step.pending} ? 'bi-arrow-up-circle' : 'bi-arrow-up-circle-fill'"></i></div>
                            <div><div class="timeline-label" th:text="${step.label}">Status</div><div class="timeline-date" th:text="${step.date}">Date</div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="rj-card">
                    <h4 class="fw-bold mb-3">Pickup Details</h4>
                    <div class="d-flex align-items-center gap-3 mb-3"><i class="bi bi-geo-alt text-rj-mid" style="font-size:20px;"></i><span th:text="${collection.address} ?: '123 Main St, Apt 4B, Vancouver'">Address</span></div>
                    <div class="d-flex align-items-center gap-3 mb-3"><i class="bi bi-calendar text-rj-mid" style="font-size:20px;"></i><span th:text="${collection.pickupDate} ?: 'Feb 12, 2026'">Date</span></div>
                    <div class="d-flex align-items-center gap-3"><i class="bi bi-clock text-rj-mid" style="font-size:20px;"></i><span th:text="${collection.pickupTime} ?: '10:00 AM - 12:00 PM'">Time</span></div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
