<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="rj-page-title mb-0">My Collection Requests</h1>
                <p class="rj-page-subtitle mt-1">Track all your pickup requests.</p>
            </div>
            <a th:href="@{/collections/new}" class="btn btn-primary px-4">
                <i class="bi bi-plus-lg me-1"></i> New Request
            </a>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(collections)}" class="rj-card text-center py-5">
            <i class="bi bi-inbox" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">You haven't made any collection requests yet.</p>
            <a th:href="@{/collections/new}" class="btn btn-primary px-4">Request a Pickup</a>
        </div>

        <!-- Request list -->
        <div th:each="req : ${collections}" class="rj-request-card">
            <div>
                <div class="req-id" th:text="'Request #' + ${req.id}">Request #123</div>
                <div class="req-meta">
                    <span th:text="${req.date}">Feb 8, 2026</span>
                    &mdash;
                    <span th:text="${req.itemCount} + ' item(s)'">3 item(s)</span>
                </div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span th:replace="~{fragments/helpers :: status-badge(${req.status})}"></span>
                <a class="btn btn-outline-secondary btn-sm disabled">View</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
