<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">Notifications</h1>
        <p class="rj-page-subtitle mb-4">Stay up to date on your requests, listings, and orders.</p>

        <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${#lists.isEmpty(notifications)}" class="rj-card text-center py-5">
            <i class="bi bi-bell-slash" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">You have no notifications.</p>
        </div>

        <div class="rj-card p-0 overflow-hidden" th:unless="${#lists.isEmpty(notifications)}">
            <div th:each="notif : ${notifications}"
                 class="rj-notif-card"
                 th:classappend="${!notif.read} ? 'unread fw-semibold'">

                <span class="rj-notif-icon">
                    <i class="bi"
                       th:classappend="${notif.type == 'PAYMENT_CONFIRMED'}         ? 'bi-credit-card-fill'       :
                                       ${notif.type == 'PICKUP_SCHEDULED'}          ? 'bi-calendar-check-fill'    :
                                       ${notif.type == 'ITEM_EVALUATED'}            ? 'bi-clipboard2-check-fill'  :
                                       ${notif.type == 'LISTING_CREATED'}           ? 'bi-tag-fill'               :
                                       ${notif.type == 'ITEM_SOLD'}                 ? 'bi-bag-check-fill'         :
                                       ${notif.type == 'PAYOUT_CREATED'}            ? 'bi-cash-stack'             :
                                       ${notif.type == 'ACCOUNT_SUSPENDED'}         ? 'bi-slash-circle-fill'      :
                                       ${notif.type == 'COLLECTION_REQUEST_UPDATED'} ? 'bi-arrow-repeat'          :
                                       ${notif.type == 'ITEM_ADDED'}               ? 'bi-plus-circle-fill'        :
                                       ${notif.type == 'ITEM_PROCESSED'}            ? 'bi-gear-fill'              :
                                       'bi-info-circle-fill'">
                    </i>
                </span>

                <div class="flex-grow-1">
                    <div th:text="${notif.message}">Notification message</div>
                    <div class="text-rj-light mt-1" style="font-size: 12px;"
                         th:text="${notif.createdAtFormatted}">Jan 1, 2026 · 10:00 AM</div>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <span th:if="${!notif.read}"
                          style="width:8px; height:8px; border-radius:50%; background:var(--rj-green); flex-shrink:0;"></span>
                    <form th:if="${!notif.read}"
                          th:action="@{/notifications/{id}/read(id=${notif.id})}"
                          method="post">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Mark read</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
