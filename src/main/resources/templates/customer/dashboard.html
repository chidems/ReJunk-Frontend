<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-7">
                <h2 class="rj-section-title">Recent Collection Requests</h2>
                <div class="rj-card-green p-3">
                    <div th:each="req : ${recentRequests}" class="rj-request-card">
                        <div>
                            <div class="req-id" th:text="${req.id}">CR-1042</div>
                            <div class="req-meta"><span th:text="${req.date}">Feb 8, 2026</span> - <span th:text="${req.itemCount} + ' Items'">3 Items</span></div>
                        </div>
                        <span th:replace="~{fragments/helpers :: status-badge(${req.status})}"></span>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <h2 class="rj-section-title">Quick Actions</h2>
                <div class="d-grid gap-2 mb-4">
                    <a th:href="@{/collections/new}" class="btn btn-primary py-2">+ New Collection Request</a>
                    <a th:href="@{/marketplace}" class="btn btn-outline-secondary py-2">Browse Marketplace</a>
                    <a th:href="@{/my-items}" class="btn btn-outline-secondary py-2">View My Items for Sale</a>
                </div>
                <h2 class="rj-section-title">Recent Notifications</h2>
                <div class="rj-card-green p-0 overflow-hidden">
                    <div th:each="notif : ${notifications}" class="rj-notif-card">
                        <span class="rj-notif-icon"><i class="bi bi-info-circle"></i></span>
                        <span th:text="${notif.message}">Notification text</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
