<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="${session.user != null and #strings.toUpperCase(session.user.role).contains('ADMIN')} ? ~{fragments/navbar :: navbar-admin} : ~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-7">
                <h2 class="rj-section-title">Recent Collection Requests</h2>
                <div class="rj-card-green p-3">
                    <div th:if="${#lists.isEmpty(recentRequests)}" class="text-rj-light" style="font-size:14px;">
                        You have no recent collection requests.
                    </div>
                    <div th:each="req, stat : ${recentRequests}" class="rj-request-card">
                        <div>
                            <div class="req-id" th:text="'Request ' + ${stat.count} + ' — ' + ${req.date}">Request 1 — Feb 8, 2026</div>
                            <div class="req-meta">
                                <span th:if="${!#strings.isEmpty(req.time)}" th:text="${req.time}">10:00 AM</span>
                                <span th:if="${!#strings.isEmpty(req.address)}"> · <span th:text="${req.address}">123 Main St</span></span>
                            </div>
                        </div>
                        <span th:replace="~{fragments/helpers :: status-badge(${req.status})}"></span>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <h2 class="rj-section-title">Quick Actions</h2>
                <div class="d-grid gap-2 mb-4">
                    <a th:href="@{/collections/new}" class="btn btn-primary py-2">+ New Collection Request</a>
                    <a th:href="@{/marketplace}" class="btn btn-outline-secondary py-2">Browse Marketplace</a>
                    <a th:href="@{/my-items}" class="btn btn-outline-secondary py-2">View My Items for Sale</a>
                </div>
                <h2 class="rj-section-title">Recent Notifications</h2>
                <div class="rj-card-green p-0 overflow-hidden">
                    <div th:if="${#lists.isEmpty(notifications)}" class="rj-notif-card text-rj-light">
                        You have no notifications.
                    </div>
                    <div th:each="notif : ${notifications}" class="rj-notif-card">
                        <span class="rj-notif-icon"><i class="bi bi-info-circle"></i></span>
                        <span th:text="${notif.message}">Notification text</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
