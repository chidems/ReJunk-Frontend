<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">My Items for Sale</h1>
        <p class="rj-page-subtitle mb-4">Items from your collection requests that are listed on the marketplace.</p>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(items)}" class="rj-card text-center py-5">
            <i class="bi bi-tags" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">None of your items are listed yet.</p>
            <a th:href="@{/collections/new}" class="btn btn-primary px-4">Request a Pickup</a>
        </div>

        <!-- Items grid -->
        <div class="row g-3" th:unless="${#lists.isEmpty(items)}">
            <div class="col-md-4" th:each="listing : ${items}">
                <div class="rj-item-card">
                    <div class="item-img">
                        <img th:src="@{/images/chair.jpg}"
                             th:alt="${listing.item.title}"
                             style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="card-body">
                        <div class="item-name" th:text="${listing.item.title}">Item Name</div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="rj-condition-badge" th:text="${listing.item.condition}">Good</span>
                            <span th:replace="~{fragments/helpers :: status-badge(${listing.listingStatus})}"></span>
                        </div>
                        <div class="item-price mt-2" th:text="'$' + ${listing.price}">$0.00</div>
                        <a th:href="@{/marketplace/{id}(id=${listing.id})}"
                           class="btn btn-outline-secondary btn-sm w-100 mt-3">View Listing</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
