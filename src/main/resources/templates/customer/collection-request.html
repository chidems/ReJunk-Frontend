<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Collection Request — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="${session.user != null and #strings.toUpperCase(session.user.role).contains('ADMIN')} ? ~{fragments/navbar :: navbar-admin} : ~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">New Collection Request</h1>
        <p class="rj-page-subtitle mb-4">Submit details about the items you'd like us to pick up.</p>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-3" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible mb-3" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <form th:action="@{/collections/new}" method="post" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="rj-card">
                        <h4 class="fw-bold mb-3">Collection Details</h4>
                        <div class="mb-3">
                            <label class="rj-form-label">Description of Items</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Value"></textarea>
                        </div>
                        <label class="rj-form-label">Photos</label>
                        <div class="d-flex gap-3 mt-1">
                            <label class="rj-upload-box"><i class="bi bi-upload" style="font-size:24px;"></i><input type="file" name="photos" multiple hidden></label>
                            <div class="rj-photo-thumb"></div>
                            <div class="rj-photo-thumb"></div>
                        </div>
                    </div>
                    <div class="rj-card mt-4" style="max-width:400px;">
                        <h4 class="fw-bold mb-2">Confirm Pickup</h4>
                        <p class="text-rj-mid small">Fee varies by distance and amount of items. Final fee confirmed after review.</p>
                        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Confirm &amp; Submit</button>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="rj-card">
                        <h4 class="fw-bold mb-3">Pickup Details</h4>
                        <div class="mb-3"><label class="rj-form-label">Pickup Address</label><input type="text" name="address" class="form-control" placeholder="Value"></div>
                        <div class="mb-3"><label class="rj-form-label">City</label><select name="city" class="form-select"><option>Select</option><option>Vancouver</option><option>Burnaby</option></select></div>
                        <div class="mb-3">
                            <label class="rj-form-label">Preferred Date</label>
                            <input type="date" name="preferredDate" id="preferredDate" class="form-control">
                            <div id="dateWarning" class="text-danger mt-1" style="font-size:13px; display:none;">Please select a date after today.</div>
                        </div>
                        <div class="mb-3">
                            <label class="rj-form-label">Preferred Time</label>
                            <select name="preferredTime" id="preferredTime" class="form-select">
                                <option value="">Select a time</option>
                            </select>
                            <div id="timeWarning" class="text-danger mt-1" style="font-size:13px; display:none;">Pickup time must be between 8:00 AM and 5:00 PM.</div>
                        </div>
                        <div class="mb-3"><label class="rj-form-label">Special Instructions</label><textarea name="instructions" class="form-control" rows="3" placeholder="Value"></textarea></div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dateInput = document.getElementById('preferredDate');
    const dateWarning = document.getElementById('dateWarning');
    const timeSelect = document.getElementById('preferredTime');
    const timeWarning = document.getElementById('timeWarning');

    // Set min date to tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    dateInput.min = tomorrow.toISOString().split('T')[0];

    // Populate time options: 8:00 AM to 5:00 PM in 5-minute increments
    for (let h = 8; h <= 17; h++) {
        for (let m = 0; m < 60; m += 5) {
            if (h === 17 && m > 0) break;
            const hour12 = h > 12 ? h - 12 : h;
            const ampm = h < 12 ? 'AM' : 'PM';
            const label = `${hour12}:${String(m).padStart(2, '0')} ${ampm}`;
            const value = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            const option = new Option(label, value);
            timeSelect.add(option);
        }
    }

    dateInput.addEventListener('change', function () {
        const selected = new Date(this.value + 'T00:00:00');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        dateWarning.style.display = selected <= today ? 'block' : 'none';
    });
</script>
</body>
</html>
