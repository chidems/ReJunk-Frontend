<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="${session.user != null and #strings.toUpperCase(session.user.role).contains('ADMIN')} ? ~{fragments/navbar :: navbar-admin} : ~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4" style="max-width:600px;">
        <h1 class="rj-page-title mb-4">My Profile</h1>

        <div th:if="${success}" class="alert alert-success alert-dismissible mb-3" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-3" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Avatar -->
        <div class="rj-card mb-4">
            <h4 class="fw-bold mb-3">Profile Picture</h4>
            <div class="d-flex align-items-center gap-4 mb-3">
                <img th:if="${session.avatarUrl != null}" th:src="${session.avatarUrl}"
                     style="width:72px;height:72px;border-radius:50%;object-fit:cover;" alt="Avatar">
                <div th:unless="${session.avatarUrl != null}"
                     style="width:72px;height:72px;border-radius:50%;background:var(--rj-green);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;"
                     th:text="${session.user != null ? #strings.substring(session.user.fullName,0,1).toUpperCase() : '?'}">U</div>
                <div>
                    <p class="mb-1 small text-rj-mid">Upload a new profile picture (JPG or PNG).</p>
                </div>
            </div>
            <form th:action="@{/profile/avatar}" method="post" enctype="multipart/form-data" class="d-flex gap-2 align-items-center">
                <input type="file" name="avatar" accept="image/*" class="form-control form-control-sm" style="max-width:280px;" required>
                <button type="submit" class="btn btn-primary btn-sm">Upload</button>
            </form>
        </div>

        <!-- User Info -->
        <div class="rj-card mb-4">
            <h4 class="fw-bold mb-3">Account Info</h4>
            <div class="mb-2">
                <span class="rj-form-label">Name</span>
                <p class="mb-0" th:text="${session.user?.fullName}">—</p>
            </div>
            <div class="mb-0">
                <span class="rj-form-label">Email</span>
                <p class="mb-0" th:text="${session.user?.email}">—</p>
            </div>
        </div>

        <!-- Default Address -->
        <div class="rj-card mb-4">
            <h4 class="fw-bold mb-3">Default Pickup Address</h4>
            <p class="small text-rj-mid mb-3">This address will be pre-filled when you create a new collection request.</p>
            <form th:action="@{/profile/address}" method="post">
                <div class="mb-3">
                    <input type="text" name="address" class="form-control"
                           placeholder="123 Main St, Vancouver"
                           th:value="${session.profileAddress}">
                </div>
                <button type="submit" class="btn btn-primary">Save Address</button>
            </form>
        </div>

        <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">Log Out</a>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
