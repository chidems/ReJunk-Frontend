<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.title != null ? item.title + ' — ReJunk' : 'Item — ReJunk'}">Item — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <a th:href="@{/marketplace}" class="d-inline-block mb-3"><i class="bi bi-arrow-left me-1"></i> Back to Marketplace</a>
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="rj-item-image">
                    <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" th:alt="${item.title}">
                    <i th:unless="${item.imageUrl != null}" class="bi bi-image" style="font-size:4rem; color:#bbb;"></i>
                </div>
            </div>
            <div class="col-lg-6">
                <h1 class="fw-bold mb-2" th:text="${item.title} ?: 'Oak Dining Table'">Oak Dining Table</h1>
                <span class="rj-condition-badge mb-3 d-inline-block" th:text="${item.condition} ?: 'Good Condition'">Good Condition</span>
                <div class="rj-price-big mt-2"><sup>$</sup><span th:text="${item.price} ?: '180.00'">180.00</span></div>
                <p class="text-rj-light mt-1" th:text="${item.category}">Text</p>

                <div class="rj-description mt-4">
                    <div class="desc-header">Description <i class="bi bi-chevron-up"></i></div>
                    <div class="desc-body" th:text="${item.description} ?: 'Solid oak dining table, seats 6. Minor surface scratches. Dimensions 72\" x 36\" x 30\". Sturdy construction, great for everyday use.'">Description text</div>
            </div>

            <a th:href="@{/marketplace/{id}/buy(id=${item.id})}" class="btn btn-primary w-100 py-3 mt-4 fw-bold" th:text="'Buy Now - $' + (${item.price} ?: '180.00')">Buy Now - $180.00</a>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
