<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <div class="row g-4">
            <!-- Left Sidebar: Filters -->
            <div class="col-lg-3">
                <div class="rj-filter-sidebar">
                    <h6 class="fw-bold mb-2">Keywords</h6>
                    <div class="mb-3">
                        <span class="rj-filter-tag">Spring <i class="bi bi-x"></i></span>
                        <span class="rj-filter-tag">Smart <i class="bi bi-x"></i></span>
                        <span class="rj-filter-tag">Modern <i class="bi bi-x"></i></span>
                    </div>
                    <div class="mb-3" th:each="filter : ${filters}">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label"><strong>Label</strong><br><small class="text-rj-light">Description</small></label>
                        </div>
                    </div>
                    <h6 class="fw-bold mt-3 mb-2">Price <span class="float-end fw-normal text-rj-light">$0-100</span></h6>
                    <input type="range" class="form-range" min="0" max="500">
                    <h6 class="fw-bold mt-3 mb-2">Color</h6>
                    <div class="form-check mb-1"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Brown</label></div>
                    <div class="form-check mb-1"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Oak</label></div>
                    <div class="form-check mb-1"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">White</label></div>
                </div>
            </div>
            <!-- Right: Search + Grid -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <form class="d-flex gap-2">
                        <div class="input-group" style="max-width:260px;">
                            <input type="text" class="form-control" placeholder="Search" name="q">
                            <button class="btn btn-outline-secondary"><i class="bi bi-search"></i></button>
                        </div>
                    </form>
                    <div class="d-flex gap-2">
                        <a href="#" class="rj-category-pill active">All</a>
                        <a th:each="cat : ${categories}" th:href="@{/marketplace(category=${cat})}" class="rj-category-pill" th:text="${cat}">Tables</a>
                        <a href="#" class="rj-category-pill">Tables</a>
                        <a href="#" class="rj-category-pill">Chairs</a>
                        <a href="#" class="rj-category-pill">Desks</a>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-md-4" th:each="listing : ${items}">
                        <a th:href="@{/marketplace/{id}(id=${listing.id})}" class="text-decoration-none">
                            <div class="rj-item-card">
                                <div class="item-img">
                                    <img th:src="@{/images/chair.jpg}"
                                         th:alt="${listing.item.title}"
                                         style="width:100%; height:100%; object-fit:cover;">
                                </div>
                                <div class="card-body">
                                    <div class="item-name" th:text="${listing.item.title} ?: 'Untitled Item'">Oak Dining Table</div>
                                    <div class="text-rj-light mt-1" style="font-size:12px; line-height:1.4;"
                                         th:if="${listing.item.description != null}"
                                         th:text="${#strings.abbreviate(listing.item.description, 60)}">Short description here</div>
                                    <div class="item-price mt-2" th:text="'$' + ${listing.price}">$180</div>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
