<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-customer}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <a th:href="@{/marketplace/{id}(id=${item.id})}" class="d-inline-block mb-3">
            <i class="bi bi-arrow-left me-1"></i> Back to Item
        </a>
        <h1 class="rj-page-title mb-4">Checkout</h1>

        <div class="row g-4">
            <!-- Left: Order summary -->
            <div class="col-lg-7">
                <div class="rj-card mb-4">
                    <h5 class="fw-bold mb-3">Order Summary</h5>
                    <div class="d-flex gap-3 align-items-center">
                        <div class="rj-item-image" style="width:100px; height:80px; flex-shrink:0; border-radius:8px;">
                            <i class="bi bi-image" style="font-size:1.8rem; color:#bbb;"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-bold" th:text="${item.item.title}">Item Name</div>
                            <span class="rj-condition-badge mt-1 d-inline-block"
                                  th:text="${item.item.condition}">Good</span>
                        </div>
                        <div class="fw-bold fs-5" th:text="'$' + ${item.price}">$0.00</div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="text-rj-light">Subtotal</span>
                        <span th:text="'$' + ${item.price}">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mt-1">
                        <span class="text-rj-light">Platform fee</span>
                        <span>$0.00</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Total</span>
                        <span th:text="'$' + ${item.price}">$0.00</span>
                    </div>
                </div>

                <!-- Payment method placeholder -->
                <div class="rj-card">
                    <h5 class="fw-bold mb-3">Payment Method</h5>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="payment" id="card" checked>
                        <label class="form-check-label" for="card">
                            <i class="bi bi-credit-card me-2"></i>Credit / Debit Card
                        </label>
                    </div>
                    <div class="row g-2 mt-2">
                        <div class="col-12">
                            <input type="text" class="form-control" placeholder="Card number">
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control" placeholder="MM / YY">
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control" placeholder="CVV">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Confirm -->
            <div class="col-lg-5">
                <div class="rj-card">
                    <h5 class="fw-bold mb-3">Delivery Address</h5>
                    <div class="mb-3">
                        <label class="rj-form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Value">
                    </div>
                    <div class="mb-3">
                        <label class="rj-form-label">Address</label>
                        <input type="text" class="form-control" placeholder="Value">
                    </div>
                    <div class="mb-3">
                        <label class="rj-form-label">City</label>
                        <select class="form-select">
                            <option>Vancouver</option>
                            <option>Burnaby</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="rj-form-label">Postal Code</label>
                        <input type="text" class="form-control" placeholder="Value">
                    </div>

                    <form th:action="@{/marketplace/{id}/buy(id=${item.id})}" method="post">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"
                                th:text="'Confirm Purchase — $' + ${item.price}">
                            Confirm Purchase
                        </button>
                    </form>
                    <p class="text-rj-light text-center mt-3" style="font-size:12px;">
                        <i class="bi bi-lock-fill me-1"></i>Secure checkout. You won't be charged until you confirm.
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
