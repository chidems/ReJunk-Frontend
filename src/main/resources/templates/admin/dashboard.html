<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">Admin Dashboard</h1>
        <p class="rj-page-subtitle mb-4">Overview of the ReJunk platform.</p>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stat cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3">
                <div class="rj-stat-card">
                    <div class="stat-value" th:text="${totalUsers}">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="rj-stat-card">
                    <div class="stat-value" th:text="${activeUsers}">0</div>
                    <div class="stat-label">Active Users</div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="rj-stat-card">
                    <div class="stat-value" th:text="${suspendedUsers}">0</div>
                    <div class="stat-label">Suspended</div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="rj-stat-card">
                    <div class="stat-value" th:text="${customerCount}">0</div>
                    <div class="stat-label">Customers</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Recent users -->
            <div class="col-lg-8">
                <h2 class="rj-section-title">Recent Users</h2>
                <div class="rj-table">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="5" class="text-center text-rj-light py-4">No users found.</td>
                            </tr>
                            <tr th:each="user : ${users}">
                                <td class="fw-semibold" th:text="${user.fullName}">Name</td>
                                <td class="text-rj-mid" th:text="${user.email}">email</td>
                                <td class="text-rj-mid" th:text="${user.role}">CUSTOMER</td>
                                <td>
                                    <span th:replace="~{fragments/helpers :: status-badge(${user.status})}"></span>
                                </td>
                                <td>
                                    <form th:if="${user.status == 'ACTIVE'}"
                                          th:action="@{/admin/users/{id}/suspend(id=${user.id})}"
                                          method="post" class="d-inline">
                                        <button class="btn btn-outline-secondary btn-sm"
                                                th:attr="data-confirm=|Suspend ${user.fullName}?|">
                                            Suspend
                                        </button>
                                    </form>
                                    <form th:if="${user.status == 'SUSPENDED'}"
                                          th:action="@{/admin/users/{id}/activate(id=${user.id})}"
                                          method="post" class="d-inline">
                                        <button class="btn btn-outline-secondary btn-sm">Activate</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Quick actions -->
            <div class="col-lg-4">
                <h2 class="rj-section-title">Quick Actions</h2>
                <div class="d-grid gap-2">
                    <a th:href="@{/admin/add-items}" class="btn btn-primary py-2">
                        <i class="bi bi-plus-lg me-1"></i> Evaluate Collection Requests
                    </a>
                    <a th:href="@{/admin/listings}" class="btn btn-outline-secondary py-2">
                        <i class="bi bi-tags me-1"></i> Manage Listings
                    </a>
                    <a th:href="@{/admin/customers}" class="btn btn-outline-secondary py-2">
                        <i class="bi bi-people me-1"></i> Manage Customers
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
