<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <a th:href="@{/admin}" class="d-inline-flex align-items-center gap-1 text-muted small mb-3 text-decoration-none">
            <i class="bi bi-arrow-left"></i> Back to Admin Dashboard
        </a>
        <h1 class="rj-page-title mb-1">Orders</h1>
        <p class="rj-page-subtitle mb-4">All customer orders placed on the marketplace.</p>

        <div th:if="${success}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="rj-card text-center py-5">
            <i class="bi bi-bag-x" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">No orders have been placed yet.</p>
        </div>

        <div class="rj-table" th:unless="${#lists.isEmpty(orders)}">
            <table class="table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td class="fw-semibold text-rj-mid" th:text="${#strings.abbreviate(order.id.toString(), 16)}">abc123...</td>
                        <td class="text-rj-mid" th:text="${order.createdAtFormatted}">Jan 1, 2026</td>
                        <td class="text-rj-mid" th:text="${order.items != null ? order.items.size() : 0} + ' item(s)'">1 item(s)</td>
                        <td class="fw-bold" th:text="'$' + ${order.totalAmount}">$0.00</td>
                        <td>
                            <span th:replace="~{fragments/helpers :: status-badge(${order.orderStatus})}"></span>
                        </td>
                        <td>
                            <div class="d-flex gap-2 justify-content-end">
                                <form th:if="${order.orderStatus == 'PAID'}"
                                      th:action="@{/admin/orders/{id}/status(id=${order.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" name="status" value="PROCESSING">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm">Mark Processing</button>
                                </form>
                                <form th:if="${order.orderStatus == 'PROCESSING'}"
                                      th:action="@{/admin/orders/{id}/status(id=${order.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" name="status" value="COMPLETED">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm">Mark Completed</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
