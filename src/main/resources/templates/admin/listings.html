<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="rj-page-title mb-0">Listings</h1>
                <p class="rj-page-subtitle mt-1">All items currently on the marketplace.</p>
            </div>
            <a th:href="@{/admin/add-items}" class="btn btn-primary px-4">
                <i class="bi bi-plus-lg me-1"></i> Add Items
            </a>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(listings)}" class="rj-card text-center py-5">
            <i class="bi bi-tags" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">No listings yet.</p>
            <a th:href="@{/admin/add-items}" class="btn btn-primary px-4">Evaluate Items</a>
        </div>

        <!-- Listings table -->
        <div class="rj-table" th:unless="${#lists.isEmpty(listings)}">
            <table class="table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Condition</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="listing : ${listings}">
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <span class="item-thumb"></span>
                                <span class="fw-semibold" th:text="${listing.title}">Item Name</span>
                            </div>
                        </td>
                        <td>
                            <span class="rj-condition-badge" th:text="${listing.condition}">Good</span>
                        </td>
                        <td class="fw-bold" th:text="'$' + ${listing.price}">$0.00</td>
                        <td>
                            <span th:replace="~{fragments/helpers :: status-badge(${listing.listingStatus})}"></span>
                        </td>
                        <td>
                            <a th:href="@{/marketplace/{id}(id=${listing.id})}"
                               class="btn btn-outline-secondary btn-sm">
                                View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
