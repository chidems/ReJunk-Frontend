<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <a th:href="@{/admin/add-items}" class="d-inline-block mb-3"><i class="bi bi-arrow-left me-1"></i> Back to Collection</a>
        <form th:action="@{/admin/add-item}" method="post" enctype="multipart/form-data">
            <div class="d-flex gap-4 mb-4 flex-wrap">
                <label class="rj-upload-box" style="width:220px; height:180px;">
                    <i class="bi bi-upload" style="font-size:28px;"></i>
                    <input type="file" name="photo" hidden>
                </label>
                <div class="d-flex gap-3 flex-wrap flex-grow-1">
                    <div>
                        <label class="rj-form-label">Item Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Leather Sofa" style="width:200px;">
                    </div>
                    <div>
                        <label class="rj-form-label">Condition</label>
                        <select name="condition" class="form-select" style="width:180px;"><option>Good</option><option>Fair</option><option>Poor</option></select>
                    </div>
                    <div>
                        <label class="rj-form-label">Resale Price</label>
                        <input type="text" name="price" class="form-control" placeholder="$25.00" style="width:160px;">
                    </div>
                </div>
            </div>
            <div class="rj-description" style="max-width:600px;">
                <div class="desc-header">Description <i class="bi bi-chevron-up"></i></div>
                <div class="p-3"><textarea name="description" class="form-control border-0 p-0" rows="3" placeholder="Solid oak dining table, seats 6..."></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-4" style="max-width:600px;">Add Item</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
