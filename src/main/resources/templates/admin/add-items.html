<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluate Items — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">Evaluate Collection Requests</h1>
        <p class="rj-page-subtitle mb-4">Review collected items and add them to the marketplace.</p>

        <!-- Flash messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(requests)}" class="rj-card text-center py-5">
            <i class="bi bi-inbox" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">No collection requests to review.</p>
        </div>

        <!-- Collection request cards -->
        <div th:each="req : ${requests}" class="rj-card mb-4">
            <!-- Request header -->
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <div class="fw-bold" th:text="'Request #' + ${req.id}">Request #123</div>
                    <div class="text-rj-light" style="font-size:13px;"
                         th:text="${req.pickupAddress}">123 Main St</div>
                </div>
                <span th:replace="~{fragments/helpers :: status-badge(${req.requestStatus})}"></span>
            </div>

            <!-- Items in this request -->
            <div th:if="${#lists.isEmpty(req.items)}" class="text-rj-light" style="font-size:13px;">
                No items recorded yet.
            </div>
            <div th:each="item : ${req.items}" class="rj-evaluate-card">
                <div class="eval-img"></div>
                <div class="flex-grow-1">
                    <h5 th:text="${item.title}">Item Name</h5>
                    <div class="eval-desc" th:text="${item.description} ?: 'No description.'">Description</div>
                    <div class="d-flex gap-2 align-items-center">
                        <span class="rj-condition-badge" th:text="${item.condition}">Good</span>
                        <span th:replace="~{fragments/helpers :: status-badge(${item.evaluationStatus})}"></span>
                    </div>
                </div>
                <div class="text-end" style="flex-shrink:0;">
                    <div th:if="${item.evaluatedPrice != null}"
                         class="fw-bold mb-2" th:text="'$' + ${item.evaluatedPrice}">$0.00</div>
                    <a th:href="@{/admin/add-item(itemId=${item.id})}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-lg me-1"></i> List Item
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
