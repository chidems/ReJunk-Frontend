<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluate Items — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">Evaluate Collection Requests</h1>
        <p class="rj-page-subtitle mb-4">Review collected items and add them to the marketplace.</p>

        <!-- Flash messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(requests)}" class="rj-card text-center py-5">
            <i class="bi bi-inbox" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">No collection requests to review.</p>
        </div>

        <!-- Collection request cards -->
        <div th:each="req : ${requests}" class="rj-card mb-4">
            <!-- Request header -->
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <div class="fw-bold" th:text="${req.pickupAddress}">123 Main St</div>
                    <div class="text-rj-light" style="font-size:13px;"
                         th:text="${req.requestStatus}">SUBMITTED</div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span th:replace="~{fragments/helpers :: status-badge(${req.requestStatus})}"></span>
                    <form th:if="${req.requestStatus == 'SUBMITTED'}"
                          th:action="@{/admin/collection-requests/{id}/status(id=${req.id})}"
                          method="post" class="d-inline">
                        <input type="hidden" name="status" value="SCHEDULED">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Mark Scheduled</button>
                    </form>
                    <form th:if="${req.requestStatus == 'SCHEDULED'}"
                          th:action="@{/admin/collection-requests/{id}/status(id=${req.id})}"
                          method="post" class="d-inline">
                        <input type="hidden" name="status" value="COLLECTED">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Mark Collected</button>
                    </form>
                    <form th:if="${req.requestStatus == 'COLLECTED'}"
                          th:action="@{/admin/collection-requests/{id}/status(id=${req.id})}"
                          method="post" class="d-inline">
                        <input type="hidden" name="status" value="EVALUATED">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Mark Evaluated</button>
                    </form>
                    <form th:if="${req.requestStatus == 'EVALUATED'}"
                          th:action="@{/admin/collection-requests/{id}/status(id=${req.id})}"
                          method="post" class="d-inline">
                        <input type="hidden" name="status" value="CLOSED">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Close Request</button>
                    </form>
                </div>
            </div>

            <!-- Items in this request -->
            <div th:if="${#lists.isEmpty(req.items)}" class="text-rj-light mb-3" style="font-size:13px;">
                No items recorded yet.
            </div>
            <div th:each="item : ${req.items}" class="rj-evaluate-card">
                <div class="eval-img" style="overflow:hidden;">
                    <img th:src="${item.imageUrl} ?: @{/images/chair.jpg}"
                         th:alt="${item.title}"
                         style="width:100%; height:100%; object-fit:cover; border-radius:10px;">
                </div>
                <div class="flex-grow-1">
                    <h5 th:text="${item.title}">Item Name</h5>
                    <div class="eval-desc" th:text="${item.description} ?: 'No description.'">Description</div>
                    <div class="d-flex gap-2 align-items-center">
                        <span class="rj-condition-badge" th:text="${item.condition}">Good</span>
                        <span th:replace="~{fragments/helpers :: status-badge(${item.evaluationStatus})}"></span>
                    </div>
                </div>
                <div class="text-end" style="flex-shrink:0;">
                    <div th:if="${item.evaluatedPrice != null}"
                         class="fw-bold mb-2" th:text="'$' + ${item.evaluatedPrice}">$0.00</div>
                    <a th:href="@{/admin/add-item(itemId=${item.id})}" class="btn btn-primary btn-sm">
                        <i class="bi bi-tags me-1"></i> List Item
                    </a>
                </div>
            </div>

            <!-- Add Item -->
            <div class="mt-3 pt-3" style="border-top: 1px solid var(--rj-border-light);">
                <button class="btn btn-outline-secondary btn-sm" type="button"
                        data-bs-toggle="collapse"
                        th:attr="data-bs-target='#add-item-' + ${req.id}"
                        aria-expanded="false">
                    <i class="bi bi-plus-lg me-1"></i> Add Item to Collection
                </button>
                <div class="collapse mt-3" th:id="'add-item-' + ${req.id}">
                    <form th:action="@{/admin/collection-requests/{id}/items(id=${req.id})}" method="post">
                        <input type="hidden" name="customerId" th:value="${req.customer?.id}">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-4">
                                <label class="rj-form-label mb-1">Title <span class="text-danger">*</span></label>
                                <input type="text" name="title" class="form-control form-control-sm"
                                       placeholder="e.g. Oak Dining Chair" required>
                            </div>
                            <div class="col-md-3">
                                <label class="rj-form-label mb-1">Description</label>
                                <input type="text" name="description" class="form-control form-control-sm"
                                       placeholder="Optional notes">
                            </div>
                            <div class="col-md-3">
                                <label class="rj-form-label mb-1">Category</label>
                                <select name="category" class="form-select form-select-sm">
                                    <option value="">— Select —</option>
                                    <option value="Chair">Chair</option>
                                    <option value="Sofa">Sofa</option>
                                    <option value="Table">Table</option>
                                    <option value="Desk">Desk</option>
                                    <option value="Shelf">Shelf</option>
                                    <option value="Bed">Bed</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary btn-sm w-100">Add</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
