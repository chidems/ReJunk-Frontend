<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Item — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>
<main class="rj-page-bg">
    <div class="container py-4">
        <a th:href="@{/admin/add-items}" class="d-inline-block mb-3"><i class="bi bi-arrow-left me-1"></i> Back to Collection</a>

        <div th:if="${error}" class="alert alert-danger alert-dismissible mb-3" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Item info (read-only) -->
        <div th:if="${item}" class="rj-card mb-4">
            <h5 class="fw-bold mb-2" th:text="${item.title}">Item Name</h5>
            <p class="text-rj-light mb-1" th:text="${item.description} ?: 'No description.'">Description</p>
            <span class="rj-condition-badge" th:text="${item.condition}">Condition</span>
        </div>

        <form th:action="@{/admin/add-item}" method="post">
            <input type="hidden" name="itemId" th:value="${item?.id}">
            <div class="d-flex gap-3 flex-wrap mb-4">
                <div>
                    <label class="rj-form-label">Condition</label>
                    <select name="condition" class="form-select" style="width:180px;">
                        <option value="NEW">New</option>
                        <option value="EXCELLENT">Excellent</option>
                        <option value="GOOD" selected>Good</option>
                        <option value="FAIR">Fair</option>
                        <option value="POOR">Poor</option>
                    </select>
                </div>
                <div>
                    <label class="rj-form-label">Resale Price</label>
                    <input type="number" name="price" class="form-control" placeholder="25.00"
                           step="0.01" min="0" style="width:160px;" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary py-2 px-4" style="max-width:600px;">
                <i class="bi bi-tags me-1"></i> Evaluate &amp; List Item
            </button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
