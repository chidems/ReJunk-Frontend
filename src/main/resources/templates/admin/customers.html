<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers — ReJunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-admin}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <h1 class="rj-page-title mb-1">Customers</h1>
        <p class="rj-page-subtitle mb-4">Manage all registered customer accounts.</p>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(customers)}" class="rj-card text-center py-5">
            <i class="bi bi-people" style="font-size:3rem; color:var(--rj-text-light);"></i>
            <p class="mt-3 text-rj-light">No customers registered yet.</p>
        </div>

        <!-- Customer table -->
        <div class="rj-table" th:unless="${#lists.isEmpty(customers)}">
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Member Since</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="customer : ${customers}">
                        <td class="fw-semibold" th:text="${customer.fullName}">Full Name</td>
                        <td class="text-rj-mid" th:text="${customer.email}">email@example.com</td>
                        <td class="text-rj-mid" th:text="${customer.phone} ?: '—'">—</td>
                        <td>
                            <span th:replace="~{fragments/helpers :: status-badge(${customer.status})}"></span>
                        </td>
                        <td class="text-rj-mid" th:text="${customer.createdAtFormatted}">Jan 1, 2026</td>
                        <td>
                            <div class="d-flex gap-2 justify-content-end">
                                <!-- Suspend / Activate toggle -->
                                <form th:if="${customer.status == 'ACTIVE'}"
                                      th:action="@{/admin/users/{id}/suspend(id=${customer.id})}"
                                      method="post">
                                    <button type="submit"
                                            class="btn btn-outline-secondary btn-sm"
                                            th:attr="data-confirm=|Suspend ${customer.fullName}?|">
                                        Suspend
                                    </button>
                                </form>
                                <form th:if="${customer.status == 'SUSPENDED'}"
                                      th:action="@{/admin/users/{id}/activate(id=${customer.id})}"
                                      method="post">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm">
                                        Activate
                                    </button>
                                </form>
                                <!-- Delete -->
                                <form th:action="@{/admin/users/{id}/delete(id=${customer.id})}"
                                      method="post">
                                    <button type="submit"
                                            class="btn btn-danger btn-sm"
                                            th:attr="data-confirm=|Delete ${customer.fullName}? This cannot be undone.|">
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
