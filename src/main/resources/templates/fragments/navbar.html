<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- PUBLIC NAVBAR -->
<nav th:fragment="navbar-public" class="navbar navbar-expand-lg rj-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/images/rejunk-logo-transparent.png}" alt="ReJunk">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navPublic">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navPublic">
            <ul class="navbar-nav align-items-center gap-1">
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'marketplace'} ? 'active'" th:href="@{/marketplace}">Marketplace</a></li>
                <li class="nav-item ms-2"><a class="btn-signin" th:href="@{/login}">Sign in</a></li>
                <li class="nav-item ms-1"><a class="btn-signup" th:href="@{/register}">Sign Up</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CUSTOMER NAVBAR -->
<nav th:fragment="navbar-customer" class="navbar navbar-expand-lg rj-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/images/rejunk-logo-transparent.png}" alt="ReJunk">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCustomer">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navCustomer">
            <ul class="navbar-nav align-items-center gap-1">
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'marketplace'} ? 'active'" th:href="@{/marketplace}">Marketplace</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'requests'} ? 'active'" th:href="@{/collections}">My Requests</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'items'} ? 'active'" th:href="@{/my-items}">My Items</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'notifications'} ? 'active'" th:href="@{/notifications}">Notifications</a></li>
                <li class="nav-item ms-2">
                    <a th:href="@{/profile}" class="d-block">
                        <img th:if="${session.avatarUrl != null}" class="avatar" th:src="${session.avatarUrl}" alt="Profile">
                        <div th:unless="${session.avatarUrl != null}"
                             class="avatar"
                             style="background:var(--rj-green);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px;"
                             th:text="${session.user != null ? #strings.substring(session.user.fullName,0,1).toUpperCase() : '?'}">U</div>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ADMIN NAVBAR-->
<nav th:fragment="navbar-admin" class="navbar navbar-expand-lg rj-navbar sticky-top">
    <div class="container">
        <div class="d-flex align-items-center">
            <a class="navbar-brand mb-0" th:href="@{/admin}">
                <img th:src="@{/images/rejunk-logo-transparent.png}" alt="ReJunk">
            </a>
            <span class="rj-admin-badge">Admin</span>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navAdmin">
            <ul class="navbar-nav align-items-center gap-1">
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'admin-dashboard'} ? 'active'" th:href="@{/admin}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'add-items'} ? 'active'" th:href="@{/admin/add-items}">Add Items</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'listings'} ? 'active'" th:href="@{/admin/listings}">Listings</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'orders'} ? 'active'" th:href="@{/admin/orders}">Orders</a></li>
                <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'customers'} ? 'active'" th:href="@{/admin/customers}">Customers</a></li>
                <li class="nav-item ms-2 dropdown">
                    <a class="settings-icon dropdown-toggle" href="#" id="adminSettingsDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-gear-fill"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="adminSettingsDropdown">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

</html>
