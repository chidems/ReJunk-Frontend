<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ReJunk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/rejunk.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-public}"></div>

<main class="rj-page-bg">
    <div class="container py-4">
        <div class="rj-auth-card">
            <div class="rj-auth-tabs">
                <a href="#" class="active" id="tab-signup">Sign Up</a>
                <a th:href="@{/login}" id="tab-login">Log In</a>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible mb-3" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="rj-form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="rj-form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="rj-form-label">Phone</label>
                    <input type="tel" name="phone" class="form-control" placeholder="555-123-4567">
                </div>
                <div class="mb-3">
                    <label class="rj-form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
                <div class="mb-3">
                    <label class="rj-form-label">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat your password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
